<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking Form | Luxury Stay</title>
    <meta name="description"
        content="Book your luxury stay at The Grand Hotel. Select room type, check-in/out dates, and customize your experience.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body
    class="font-poppins bg-gradient-to-br from-primary via-primary-light to-primary min-h-screen flex items-center justify-center p-5 relative overflow-x-hidden">

    <!-- Animated Background Shapes -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div
            class="absolute w-[600px] h-[600px] bg-accent rounded-full opacity-10 -top-[200px] -right-[100px] animate-float">
        </div>
        <div
            class="absolute w-[400px] h-[400px] bg-white rounded-full opacity-10 -bottom-[100px] -left-[100px] animate-float [animation-delay:-5s]">
        </div>
        <div
            class="absolute w-[300px] h-[300px] bg-accent rounded-full opacity-[0.05] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-float [animation-delay:-10s]">
        </div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-[540px] relative z-[1]">

        <!-- Form Card -->
        <div
            class="form-card-stripe bg-white/95 backdrop-blur-[20px] rounded-3xl shadow-[0_16px_48px_rgba(26,54,93,0.16)] p-8 sm:p-10 md:p-12 animate-slide-up relative overflow-hidden">

            <!-- Header -->
            <header class="text-center mb-10">
                <span
                    class="inline-block text-xs font-medium tracking-[3px] uppercase text-accent mb-2 animate-fade-in">Welcome
                    to</span>
                <h1 class="font-playfair text-3xl sm:text-4xl font-semibold text-primary mb-2 animate-fade-in-delay-1">
                    The Grand Hotel</h1>
                <p class="text-sm text-gray-500 animate-fade-in-delay-2">Experience luxury like never before</p>
            </header>

            <!-- Booking Form -->
            <form id="bookingForm" class="flex flex-col gap-6">

                <!-- Check-in & Check-out Row -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <!-- Check-in Date -->
                    <div class="flex flex-col gap-2">
                        <label for="checkin" class="text-sm font-medium text-primary">Check-in Date</label>
                        <div class="relative flex items-center group">
                            <svg class="absolute left-4 w-5 h-5 text-gray-500 transition-all duration-300 pointer-events-none group-focus-within:text-accent"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            <input type="date" id="checkin" required
                                class="w-full py-4 pl-12 pr-4 font-poppins text-[15px] text-primary bg-white border-2 border-gray-200 rounded-lg outline-none transition-all duration-300 focus:border-accent focus:ring-4 focus:ring-accent/15">
                        </div>
                        <p id="checkinError" class="text-xs text-red-500 min-h-[18px]"></p>
                    </div>

                    <!-- Check-out Date -->
                    <div class="flex flex-col gap-2">
                        <label for="checkout" class="text-sm font-medium text-primary">Check-out Date</label>
                        <div class="relative flex items-center group">
                            <svg class="absolute left-4 w-5 h-5 text-gray-500 transition-all duration-300 pointer-events-none group-focus-within:text-accent"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            <input type="date" id="checkout" required
                                class="w-full py-4 pl-12 pr-4 font-poppins text-[15px] text-primary bg-white border-2 border-gray-200 rounded-lg outline-none transition-all duration-300 focus:border-accent focus:ring-4 focus:ring-accent/15">
                        </div>
                        <p id="checkoutError" class="text-xs text-red-500 min-h-[18px]"></p>
                    </div>
                </div>

                <!-- Room Type & Guests Row -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <!-- Room Type -->
                    <div class="flex flex-col gap-2">
                        <label for="roomType" class="text-sm font-medium text-primary">Room Type</label>
                        <div class="relative flex items-center group">
                            <svg class="absolute left-4 w-5 h-5 text-gray-500 transition-all duration-300 pointer-events-none z-[1] group-focus-within:text-accent"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path
                                    d="M3 21h18M3 7v14M21 7v14M6 7V4a1 1 0 011-1h10a1 1 0 011 1v3M9 21v-4a1 1 0 011-1h4a1 1 0 011 1v4">
                                </path>
                            </svg>
                            <select id="roomType" required
                                class="w-full py-4 pl-12 pr-10 font-poppins text-[15px] text-primary bg-white border-2 border-gray-200 rounded-lg outline-none transition-all duration-300 appearance-none cursor-pointer focus:border-accent focus:ring-4 focus:ring-accent/15">
                                <option value="" disabled selected>Select your room</option>
                                <option value="single">Single Room</option>
                                <option value="double">Double Room</option>
                                <option value="suite">Suite</option>
                                <option value="deluxe">Deluxe Suite</option>
                            </select>
                            <svg class="absolute right-4 w-5 h-5 text-gray-500 pointer-events-none" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <p id="roomTypeError" class="text-xs text-red-500 min-h-[18px]"></p>
                    </div>

                    <!-- Number of Guests -->
                    <div class="flex flex-col gap-2">
                        <label for="guests" class="text-sm font-medium text-primary">Number of Guests</label>
                        <div class="relative flex items-center group">
                            <svg class="absolute left-4 w-5 h-5 text-gray-500 transition-all duration-300 pointer-events-none group-focus-within:text-accent"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <input type="number" id="guests" min="1" max="10" value="1" required
                                class="w-full py-4 pl-12 pr-4 font-poppins text-[15px] text-primary bg-white border-2 border-gray-200 rounded-lg outline-none transition-all duration-300 focus:border-accent focus:ring-4 focus:ring-accent/15">
                        </div>
                        <p id="guestsError" class="text-xs text-red-500 min-h-[18px]"></p>
                    </div>
                </div>

                <!-- Special Requests -->
                <div class="flex flex-col gap-2">
                    <label for="requests" class="text-sm font-medium text-primary">
                        Special Requests <span class="font-normal text-gray-500 text-xs">(Optional)</span>
                    </label>
                    <div class="relative">
                        <textarea id="requests" maxlength="300" rows="4"
                            placeholder="Any special requests or preferences..."
                            class="w-full p-4 font-poppins text-[15px] text-primary bg-white border-2 border-gray-200 rounded-lg outline-none transition-all duration-300 resize-none min-h-[120px] focus:border-accent focus:ring-4 focus:ring-accent/15"></textarea>
                        <span class="absolute bottom-3 right-4 text-xs text-gray-500"><span
                                id="charCount">0</span>/300</span>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="shimmer-btn w-full py-[18px] px-8 mt-2 font-poppins text-base font-semibold text-white bg-gradient-to-br from-primary to-primary-light border-none rounded-lg cursor-pointer transition-all duration-300 flex items-center justify-center gap-3 relative overflow-hidden hover:-translate-y-0.5 hover:shadow-[0_8px_24px_rgba(26,54,93,0.3)] active:translate-y-0 active:scale-[0.98]">
                    <span class="relative z-[1]">Book Now</span>
                    <svg class="w-5 h-5 relative z-[1] transition-transform duration-300" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <!-- Success Overlay -->
            <div id="successMessage"
                class="absolute inset-0 bg-white/[0.98] flex flex-col items-center justify-center text-center p-10 opacity-0 pointer-events-none transition-all duration-300 z-10">
                <div
                    class="w-20 h-20 bg-gradient-to-br from-green-600 to-green-400 rounded-full flex items-center justify-center mb-6 animate-scale-in">
                    <svg class="w-10 h-10 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h3 class="font-playfair text-[28px] text-primary mb-3">Booking Confirmed!</h3>
                <p class="text-sm text-gray-500 max-w-[300px] leading-relaxed mb-8">Thank you for choosing The Grand
                    Hotel. We'll send a confirmation email shortly.</p>
                <button id="resetBtn"
                    class="py-3.5 px-8 font-poppins text-sm font-medium text-primary bg-transparent border-2 border-primary rounded-lg cursor-pointer transition-all duration-300 hover:bg-primary hover:text-white">
                    Make Another Booking
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center mt-6 animate-fade-in-delay-4">
            <p class="text-xs text-white/60">&copy; 2026 The Grand Hotel. All rights reserved.</p>
        </footer>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
